<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Wade Adam Dashboard</title>
<link rel="icon" href="assets/favicon.jpeg">
<style>

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #c0d8e9, #aecadb);
}

.login-container {
    background: white;
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    width: 350px;
    text-align: center;
    position: relative;
}

.login-container .logo {
    width: 120px;
    margin-bottom: 20px;
}

.login-container h2 {
    margin-bottom: 25px;
    color: #333;
}

.login-container input[type="text"],
.login-container input[type="password"] {
    width: 100%;
    padding: 12px 10px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
    transition: 0.3s;
}

.login-container input:focus {
    border-color: #c0d8e9;
    outline: none;
    box-shadow: 0 0 5px #c0d8e9;
}

.login-container button {
    width: 100%;
    padding: 12px;
    background: #c0d8e9;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    align-items: center;
}

.login-container button:hover {
    background: #a8cde3;
}

.login-container .error {
    color: red;
    margin-bottom: 10px;
    font-size: 14px;
}

#myVideo {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
}

.content {
  position: fixed;
  bottom: 0;
 
  color: #f1f1f1;
  width: 100%;
  padding: 20px;
}
#myBtn {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 80px;
  padding: 50px;

  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(6px);

  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 50%;

  color: #fff;
  font-size: 14px;
  font-family:  Helvetica, Arial, sans-serif;

  cursor: pointer;
  transition: all 0.25s ease;
}

#myBtn:hover {
  background: rgba(255, 255, 255, 0.2);
  transform: scale(1.10);
}

#myBtn:active {
  transform: scale(0.95);
}

</style>
</head>

<body>
<video autoplay muted loop id="myVideo">
  <source src="assets/5349085-hd_1280_720_60fps.mp4" type="video/mp4">
</video>

<!-- Optional: some overlay text to describe the video -->
<div class="content">

  <button id="myBtn" onclick="myFunction()">Pause</button>
</div>

<div class="login-container">
    <img src="assets/2wadeadamlogo.jpeg" class="logo" alt="Wade Adam">
    <form id="loginForm">
        <h2>Login</h2>
        <p class="error" id="errorMsg"></p>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<script>

const USERNAME = "admin";
const PASSWORD = "password123";

document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('errorMsg');

    if(user === USERNAME && pass === PASSWORD){
        localStorage.setItem('loggedIn', 'true');
        window.location.href = 'dashboard.html';
    } else {
        errorMsg.textContent = "Invalid username or password";
    }
});

var video = document.getElementById("myVideo");
var btn = document.getElementById("myBtn");

function myFunction() {
  if (video.paused) {
    video.play();
    btn.innerHTML = "Pause";
  } else {
    video.pause();
    btn.innerHTML = "Play";
  }
}
</script>
</body>
</html>
